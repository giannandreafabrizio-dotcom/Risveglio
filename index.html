<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05070F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Risveglio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#05070F; --panel:rgba(14,22,42,.72); --line:rgba(90,150,230,.28);
  --sys:#43B4FF; --glow:#6FE9FF; --violet:#B57BFF; --gold:#FFC663;
  --green:#4DFFA6; --red:#FF5468; --text:#DCE6FA; --dim:#7C8AAE;
  --disp:'Rajdhani',sans-serif; --mono:'Share Tech Mono',monospace; --num:'Orbitron',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(120% 80% at 50% -10%, #10203f 0%, var(--bg) 60%);
  color:var(--text); font-family:var(--disp);
  background-attachment:fixed;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;
  padding:24px 16px calc(84px + env(safe-area-inset-bottom));}
#app::before{content:"";position:fixed;inset:0;max-width:480px;margin:0 auto;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:34px 34px;opacity:.13;}

/* ---- system panel ---- */
.panel{position:relative;background:var(--panel);border:1px solid var(--line);
  box-shadow:0 0 18px -6px color-mix(in srgb,var(--pg,var(--sys)) 50%,transparent),
             inset 0 0 22px -12px color-mix(in srgb,var(--pg,var(--sys)) 40%,transparent);
  backdrop-filter:blur(4px);padding:14px;}
.panel::before,.panel::after{content:"";position:absolute;width:12px;height:12px;pointer-events:none;
  border-color:var(--pg,var(--sys));}
.panel::before{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid}
.panel::after{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid}

.lbl{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--sys)}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)}
.row{display:flex;align-items:center;justify-content:space-between}
button{font-family:inherit;cursor:pointer}
input{font-family:var(--mono)}

/* ---- header ---- */
.hi{font-family:var(--disp);font-size:22px;font-weight:700;line-height:1;color:var(--text)}

/* ---- level ---- */
.lvnum{font-family:var(--num);font-size:46px;font-weight:800;line-height:.9;color:var(--glow);
  text-shadow:0 0 20px rgba(67,180,255,.6)}
.rank{font-family:var(--disp);font-size:30px;font-weight:800;line-height:1;color:var(--violet);
  text-shadow:0 0 16px rgba(181,123,255,.5)}
.bar{height:9px;background:rgba(255,255,255,.06);border:1px solid var(--line);position:relative;overflow:hidden}
.bar>i{position:absolute;inset:0;background:linear-gradient(90deg,var(--sys),var(--glow));
  box-shadow:0 0 12px var(--glow);transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* ---- quest card ---- */
.q{display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:opacity .3s}
.q.done{opacity:.55;cursor:default}
.q .ic{width:34px;height:34px;flex:0 0 auto;display:grid;place-items:center;
  border:1px solid color-mix(in srgb,var(--cat) 45%,transparent);color:var(--cat);
  background:color-mix(in srgb,var(--cat) 8%,transparent);font-family:var(--mono);font-size:15px}
.q .t{flex:1;min-width:0}
.q .t b{font-family:var(--disp);font-size:15px;font-weight:600;color:var(--text);display:block}
.q.done .t b{text-decoration:line-through}
.q .t span{font-family:var(--mono);font-size:10px;color:var(--dim);display:block;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q .xp{font-family:var(--mono);font-size:11px;color:var(--cat);flex:0 0 auto}
.q .ck{width:26px;height:26px;flex:0 0 auto;display:grid;place-items:center;
  border:1.5px solid color-mix(in srgb,var(--cat) 45%,transparent);color:var(--green);font-family:var(--mono)}
.q.done .ck{border-color:var(--green);background:rgba(77,255,166,.12)}

.stack{display:flex;flex-direction:column;gap:9px}
.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb18{margin-bottom:18px}.mt8{margin-top:8px}

/* ---- bottom nav ---- */
#nav{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;height:74px;
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(6,10,22,.92);border-top:1px solid var(--line);display:flex;backdrop-filter:blur(8px);z-index:20}
#nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;color:var(--dim);position:relative}
#nav button.on{color:var(--glow)}
#nav button.on::before{content:"";position:absolute;top:0;width:26px;height:2px;background:var(--glow);box-shadow:0 0 8px var(--glow)}
#nav .ni{font-size:19px;line-height:1}
#nav .nt{font-family:var(--mono);font-size:9px;letter-spacing:1px}

/* ---- toast ---- */
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:40;display:none;
  background:rgba(6,10,22,.95);padding:8px 16px;font-family:var(--mono);font-size:13px;
  letter-spacing:1px;white-space:nowrap;animation:pop .2s ease-out}
@keyframes pop{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---- special quest modal ---- */
#special{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:24px;
  background:rgba(3,5,12,.86);backdrop-filter:blur(3px)}
#special .box{width:100%;max-width:400px;background:#0C1428;border:1px solid var(--violet);
  box-shadow:0 0 40px -6px var(--violet), inset 0 0 40px -20px var(--violet);animation:sq .35s cubic-bezier(.2,.9,.3,1.2)}
@keyframes sq{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.btnfull{width:100%;padding:13px;font-family:var(--mono);font-size:13px;letter-spacing:2px;
  color:#05070F;font-weight:700;border:none;background:linear-gradient(90deg,var(--violet),var(--glow));
  box-shadow:0 0 20px -4px var(--violet)}
.demo{width:100%;padding:11px;font-family:var(--mono);font-size:12px;letter-spacing:1px;
  color:var(--red);border:1px solid rgba(255,84,104,.4);background:rgba(255,84,104,.05)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:3px 8px}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"><div id="screen"></div></div>

<nav id="nav">
  <button data-tab="home" class="on"><span class="ni">⚡</span><span class="nt">Quest</span></button>
  <button data-tab="workout"><span class="ni">🏋</span><span class="nt">Schede</span></button>
  <button data-tab="cal"><span class="ni">▦</span><span class="nt">Calendario</span></button>
  <button data-tab="lib"><span class="ni">▤</span><span class="nt">Libreria</span></button>
  <button data-tab="me"><span class="ni">◈</span><span class="nt">Profilo</span></button>
</nav>

<div id="toast"></div>
<div id="special"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   RISVEGLIO — app a file singolo (stile NutriGest)
   ============================================================ */

/* ⬇⬇⬇ INCOLLA QUI LE TUE 2 CHIAVI SUPABASE ⬇⬇⬇
   Le trovi in Supabase → Settings (⚙) → API
   - SUPABASE_URL      = "Project URL"
   - SUPABASE_ANON_KEY = "anon public"  (NON la service_role)          */
const SUPABASE_URL      = "https://zxuexfhuxxmsleiqkoaz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dWV4Zmh1eHhtc2xlaXFrb2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMTQxOTUsImV4cCI6MjA5OTg5MDE5NX0.g9bYQzGoi-rol7TvAhUlrYitB7A0DKGbMW9FSMc8TkQ";
/* ⬆⬆⬆ ------------------------------------------- ⬆⬆⬆ */

const OWNER_ID = "00000000-0000-0000-0000-000000000001"; // il tuo unico profilo

/* ---------- logica livelli (pura) ---------- */
const XP_BASE=140, XP_STEP=6, MILESTONE=20, COMBO_BONUS=30, SKIP_PENALTY=70;
const xpNeeded = lvl => XP_BASE + lvl*XP_STEP;
function rankForLevel(l){ return l>=80?'S':l>=55?'A':l>=35?'B':l>=20?'C':l>=10?'D':'E'; }
function applyXp(s, delta){
  const start=s.level; let lvl=s.level, xp=s.currentXp+delta;
  while(xp>=xpNeeded(lvl)){ xp-=xpNeeded(lvl); lvl++; }
  while(xp<0 && lvl>1){ lvl--; xp+=xpNeeded(lvl); }
  if(xp<0) xp=0;
  const newMax=Math.max(s.maxLevelReached,lvl);
  const prevM=Math.floor(s.maxLevelReached/MILESTONE)*MILESTONE;
  const currM=Math.floor(newMax/MILESTONE)*MILESTONE;
  const newMilestone=(currM>prevM && currM>=MILESTONE)?currM:null;
  return {level:lvl,currentXp:xp,maxLevelReached:newMax,rank:rankForLevel(lvl),newMilestone};
}

/* ---------- categorie ---------- */
const CAT={
  sport:{c:'#4FE0FF',ic:'⚔'}, cultura:{c:'#B57BFF',ic:'▤'},
  corsi:{c:'#FFC663',ic:'↗'}, meditazione:{c:'#4DFFA6',ic:'◈'}
};

/* ---------- stato + client ---------- */
let sb=null, profile=null, quests=[], doneToday=new Set(), tab='home';
const localDate = tz => new Intl.DateTimeFormat('en-CA',{timeZone:tz||'Europe/Rome'}).format(new Date());
const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(txt,color){
  const t=$('#toast'); t.style.color=color; t.style.border='1px solid '+color;
  t.style.boxShadow='0 0 16px -2px '+color; t.textContent='[ '+txt+' ]';
  t.style.display='block'; clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.style.display='none',1400);
}

/* ---------- caricamento ---------- */
async function load(){
  const [{data:prof},{data:qs}] = await Promise.all([
    sb.from('profiles').select('*').eq('id',OWNER_ID).single(),
    sb.from('quests').select('*').eq('is_active',true).eq('frequency','daily').order('sort_order')
  ]);
  profile=prof; quests=qs||[];
  const today=localDate(profile?.timezone);
  const {data:logs}=await sb.from('quest_logs').select('quest_id').eq('user_id',OWNER_ID).eq('log_date',today);
  doneToday=new Set((logs||[]).map(l=>l.quest_id));
  render();
}

/* ---------- scrittura XP: ledger + cache profilo ---------- */
async function commitXp(delta,reason,refId,base){
  const res=applyXp({level:base.level,currentXp:base.current_xp,maxLevelReached:base.max_level_reached},delta);
  const updated={...base,level:res.level,current_xp:res.currentXp,max_level_reached:res.maxLevelReached,rank:res.rank};
  await sb.from('xp_events').insert({user_id:OWNER_ID,delta,reason,ref_id:refId||null});
  await sb.from('profiles').update({level:updated.level,current_xp:updated.current_xp,
    max_level_reached:updated.max_level_reached,rank:updated.rank}).eq('id',OWNER_ID);
  return {updated,res};
}
async function bumpStreak(base,today){
  const d=new Date(today); d.setDate(d.getDate()-1); const y=d.toISOString().slice(0,10);
  let next = base.last_active_date===today ? base.streak_count
           : base.last_active_date===y ? base.streak_count+1 : 1;
  await sb.from('profiles').update({streak_count:next,last_active_date:today}).eq('id',OWNER_ID);
  base.streak_count=next; base.last_active_date=today;
}

/* ---------- completa quest ---------- */
async function completeQuest(id){
  if(doneToday.has(id)) return;
  const q=quests.find(x=>x.id===id); if(!q) return;
  const today=localDate(profile.timezone);
  doneToday.add(id); render();                                  // ottimistico
  const {error}=await sb.from('quest_logs').insert({user_id:OWNER_ID,quest_id:id,log_date:today,xp_awarded:q.xp_value});
  if(error){ doneToday.delete(id); toast('Errore, riprova',getVar('--red')); render(); return; }
  let {updated,res}=await commitXp(q.xp_value,'quest',id,profile); profile=updated;
  toast('+'+q.xp_value+' XP · '+q.category, CAT[q.category].c);
  if(res.newMilestone) showSpecial(res.newMilestone);
  if(quests.every(x=>doneToday.has(x.id))){
    const combo=await commitXp(COMBO_BONUS,'combo',null,profile); profile=combo.updated;
    setTimeout(()=>toast('COMBO GIORNALIERA +'+COMBO_BONUS+' XP',getVar('--gold')),750);
    if(combo.res.newMilestone) showSpecial(combo.res.newMilestone);
    await bumpStreak(profile,today);
  }
  render();
}
async function skipDay(){
  const {updated}=await commitXp(-SKIP_PENALTY,'penalty',null,profile);
  await sb.from('profiles').update({streak_count:0}).eq('id',OWNER_ID);
  profile={...updated,streak_count:0}; toast('PENALITÀ −'+SKIP_PENALTY+' XP',getVar('--red')); render();
}
const getVar=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* ---------- rendering ---------- */
function render(){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  const s=$('#screen');
  if(tab==='home') s.innerHTML=viewHome();
  else if(tab==='workout') s.innerHTML=viewWorkout();
  else if(tab==='cal') s.innerHTML=viewCalendar();
  else if(tab==='lib') s.innerHTML=viewLibrary();
  else if(tab==='me') s.innerHTML=viewProfile();
}

function viewHome(){
  const need=xpNeeded(profile.level), pct=Math.min(100,profile.current_xp/need*100);
  const done=[...doneToday].filter(id=>quests.some(q=>q.id===id)).length;
  const qcards=quests.map(q=>{
    const m=CAT[q.category]||CAT.cultura, isDone=doneToday.has(q.id);
    return `<div class="panel q ${isDone?'done':''}" style="--cat:${m.c};--pg:${m.c}" data-action="quest" data-id="${q.id}">
      <div class="ic">${m.ic}</div>
      <div class="t"><b>${esc(q.title)}</b><span>${esc(q.subtitle||'')}</span></div>
      <div class="xp">+${q.xp_value}</div>
      <div class="ck">${isDone?'✔':''}</div></div>`;
  }).join('');
  return `
    <div class="row mb14">
      <div><div class="lbl dim">System · Risveglio</div><div class="hi">Buongiorno, ${esc(profile.display_name||'Cacciatore')}</div></div>
      <div class="mono" style="color:var(--gold)">🔥 ${profile.streak_count}</div>
    </div>
    <div class="panel mb16" style="--pg:var(--sys)">
      <div class="row">
        <div><div class="lbl dim">Livello</div><div class="lvnum">${profile.level}</div></div>
        <div style="text-align:right"><div class="lbl" style="color:var(--violet)">Grado</div><div class="rank">${profile.rank}</div></div>
      </div>
      <div class="mt8">
        <div class="row mono" style="font-size:10px;color:var(--dim);margin-bottom:5px"><span>XP</span><span>${profile.current_xp} / ${need}</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div>
      </div>
    </div>
    <div class="row" style="margin-bottom:8px"><div class="lbl">Quest Giornaliere</div>
      <span class="mono" style="font-size:11px;color:${done===quests.length?'var(--green)':'var(--dim)'}">${done}/${quests.length}</span></div>
    <div class="stack">${qcards}</div>`;
}

/* ---- schede (anteprima statica, da collegare dopo) ---- */
function viewWorkout(){
  const ex=[['Panca piana','4×8','62'],['Military press','4×10','34'],['Dip parallele','3×12','—'],['Push-up (quest)','100 reps','—']];
  const rows=ex.map(([n,s,l])=>`<div class="panel" style="--pg:var(--sys);padding:12px">
     <div class="row" style="margin-bottom:10px"><div><b style="font-family:var(--disp);font-size:15px">${n}</b>
     <div class="mono" style="font-size:10px;color:var(--dim)">${s} · ultimo: ${l}kg</div></div></div>
     <div style="display:flex;gap:8px;align-items:center">
       <input type="number" placeholder="peso" style="flex:1;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--glow);font-size:14px;padding:8px 10px;outline:none">
       <span class="mono" style="font-size:12px;color:var(--dim)">kg</span>
       <button class="mono" style="padding:8px 14px;color:var(--sys);border:1px solid var(--sys);background:transparent;font-size:11px">SALVA</button>
     </div></div>`).join('');
  return `<div class="lbl dim">Le mie schede</div><div class="hi mb14">Allenamento</div>
     <div class="lbl" style="color:var(--sys)">Giorno A · Spinta</div>
     <div class="stack mt8">${rows}</div>
     <div class="mono" style="font-size:10px;color:var(--dim);margin-top:14px;text-align:center">anteprima · da collegare al database</div>`;
}
function viewCalendar(){
  const days=[['LUN',14,[['Turno 09–17','--dim'],['Meditazione','--green']]],['MAR',15,[['Allenamento A','--sys'],['Duolingo','--violet']]],
    ['MER',16,[['Turno 09–17','--dim']]],['GIO',17,[['Allenamento B','--sys'],['Lezione PT','--gold']]],
    ['VEN',18,[['Turno 14–22','--dim']]],['SAB',19,[['Allenamento C','--sys'],['Corsa 10km','--sys']]],['DOM',20,[['Riposo','--dim']]]];
  const rows=days.map(([d,n,ev])=>`<div class="panel" style="--pg:var(--sys);padding:10px;display:flex;gap:12px;align-items:center">
    <div style="width:40px;text-align:center;flex:0 0 auto"><div class="mono" style="font-size:10px;color:var(--dim)">${d}</div>
    <div style="font-family:var(--disp);font-size:22px;font-weight:700;line-height:1">${n}</div></div>
    <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px">${ev.map(([t,c])=>`<span class="chip" style="color:var(${c});border:1px solid color-mix(in srgb,var(${c}) 40%,transparent);background:color-mix(in srgb,var(${c}) 8%,transparent)">${t}</span>`).join('')}</div></div>`).join('');
  return `<div class="lbl dim">Pianificazione</div><div class="hi mb14">Luglio 2026</div><div class="stack">${rows}</div>
     <div class="mono" style="font-size:10px;color:var(--dim);margin-top:14px;text-align:center">anteprima · da collegare al database</div>`;
}
function viewLibrary(){
  const books=[['Il Conte di Montecristo','Dumas','in lettura','--violet'],['The Intelligent Investor','Graham','Giu 2026','--gold'],
    ['Padre Ricco Padre Povero','Kiyosaki','Mag 2026','--gold'],['Meditazioni','M. Aurelio','Apr 2026','--green'],
    ['Sapiens','Harari','Mar 2026','--sys'],['1984','Orwell','Feb 2026','--sys']];
  const cards=books.map(([t,a,d,c])=>`<div class="panel" style="--pg:var(${c});padding:12px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between">
    <div><div style="width:26px;height:3px;background:var(${c});box-shadow:0 0 8px var(${c});margin-bottom:10px"></div>
    <b style="font-family:var(--disp);font-size:14px">${t}</b><div class="mono" style="font-size:10px;color:var(--dim);margin-top:2px">${a}</div></div>
    <div class="mono" style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)">${d}</div></div>`).join('');
  return `<div class="row mb14"><div><div class="lbl dim">Memoria</div><div class="hi">Libreria</div></div>
    <div style="font-family:var(--num);font-size:20px;color:var(--glow)">12</div></div><div class="grid2">${cards}</div>`;
}
function viewProfile(){
  const done=[...doneToday].filter(id=>quests.some(q=>q.id===id)).length;
  const stats=[['Streak',profile.streak_count+'g','--gold'],['Quest oggi',done+'/'+quests.length,'--sys'],['Lv. max',profile.max_level_reached,'--violet']];
  const ms=[1,20,40,60,80].map(m=>{const u=profile.max_level_reached>=m;
    return `<div style="flex:0 0 auto;width:92px"><div style="height:116px;border:1px solid ${u?'var(--glow)':'var(--line)'};
      background:${u?'linear-gradient(160deg,rgba(67,180,255,.13),transparent)':'rgba(255,255,255,.02)'};
      display:grid;place-items:center;color:${u?'var(--glow)':'var(--dim)'};position:relative">
      <span style="font-size:26px">${u?'◈':'🔒'}</span>
      <span class="mono" style="position:absolute;bottom:6px;font-size:9px;color:${u?'var(--glow)':'var(--dim)'}">${u?'SCATTA':'BLOCCATA'}</span></div>
      <div style="text-align:center;font-family:var(--disp);font-size:13px;font-weight:600;color:${u?'var(--text)':'var(--dim)'};margin-top:6px">Lv. ${m}</div></div>`;}).join('');
  return `<div class="lbl dim">Scheda Cacciatore</div><div class="hi mb14">Il mio percorso</div>
    <div class="panel mb16" style="--pg:var(--violet);display:flex;gap:14px;align-items:center">
      <div style="width:74px;height:88px;flex:0 0 auto;border:1px solid color-mix(in srgb,var(--violet) 40%,transparent);
        background:linear-gradient(160deg,rgba(181,123,255,.13),transparent);display:grid;place-items:center;color:var(--violet);font-size:32px">◈</div>
      <div><div class="lbl" style="color:var(--violet)">Livello attuale</div><div class="lvnum">${profile.level}</div>
      <div class="mono" style="font-size:10px;color:var(--dim);margin-top:4px">GRADO ${profile.rank} · CACCIATORE</div></div></div>
    <div style="display:flex;gap:8px" class="mb18">${stats.map(([l,v,c])=>`<div class="panel" style="--pg:var(${c});flex:1;padding:10px;text-align:center">
      <div style="font-family:var(--num);font-size:18px;color:var(${c})">${v}</div>
      <div class="mono" style="font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:3px">${l.toUpperCase()}</div></div>`).join('')}</div>
    <div class="lbl">Archivio Estetico</div>
    <div class="mono" style="font-size:10px;color:var(--dim);margin:4px 0 10px">una foto ogni 20 livelli</div>
    <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:6px">${ms}</div>
    <div style="margin-top:22px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="mono" style="font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:8px">DEMO · SIMULA FLUTTUAZIONE</div>
      <button class="demo" data-action="skip">✕ QUEST GIORNALIERA SALTATA (−${SKIP_PENALTY} XP)</button></div>`;
}

/* ---------- special quest modal ---------- */
function showSpecial(level){
  const box=`<div class="box"><div style="padding:10px 14px;border-bottom:1px solid color-mix(in srgb,var(--violet) 35%,transparent);display:flex;justify-content:space-between;align-items:center">
    <span class="mono" style="font-size:11px;letter-spacing:2px;color:var(--violet)">⚠ AVVISO DEL SISTEMA</span>
    <button data-action="close-special" style="background:none;border:none;color:var(--dim);font-size:16px">✕</button></div>
    <div style="padding:22px;text-align:center">
      <div style="font-family:var(--num);font-size:15px;letter-spacing:3px;color:var(--violet);margin-bottom:6px">QUEST SPECIALE</div>
      <div style="font-family:var(--disp);font-size:26px;font-weight:800;color:var(--glow);text-shadow:0 0 20px var(--sys);line-height:1.05;margin-bottom:14px">LIVELLO ${level}<br>RAGGIUNTO</div>
      <div class="mono" style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:20px">
        Hai superato una soglia.<br>Sblocca: <span style="color:var(--glow)">foto milestone Lv.${level}</span><br>
        Nuova sfida: <span style="color:var(--gold)">7 giorni di streak perfetta</span></div>
      <button class="btnfull" data-action="close-special">ACCETTA</button></div></div>`;
  const m=$('#special'); m.innerHTML=box; m.style.display='grid';
}

/* ---------- eventi ---------- */
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return; tab=b.dataset.tab; render();
});
document.getElementById('screen').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const a=el.dataset.action;
  if(a==='quest') completeQuest(el.dataset.id);
  else if(a==='skip') skipDay();
});
document.getElementById('special').addEventListener('click',e=>{
  if(e.target.closest('[data-action="close-special"]') || e.target.id==='special'){
    $('#special').style.display='none';
  }
});

/* ---------- avvio ---------- */
(function start(){
  if(SUPABASE_URL.startsWith('INCOLLA') || SUPABASE_ANON_KEY.startsWith('INCOLLA')){
    $('#screen').innerHTML=`<div class="panel" style="--pg:var(--gold);margin-top:40px">
      <div class="lbl" style="color:var(--gold)">Configurazione</div>
      <p style="font-family:var(--disp);font-size:15px;line-height:1.5">Apri <b>index.html</b> e incolla le tue 2 chiavi Supabase
      dove indicato (in cima allo <span class="mono">&lt;script&gt;</span>), poi ricarica la pagina.</p></div>`;
    return;
  }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  load().catch(err=>{ $('#screen').innerHTML=`<div class="panel" style="--pg:var(--red);margin-top:40px">
    <div class="lbl" style="color:var(--red)">Errore</div>
    <p style="font-family:var(--mono);font-size:12px;line-height:1.5">${esc(err.message||String(err))}</p></div>`; });
})();
</script>
</body>
</html>
